<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waist Circuit</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0010;font-family:system-ui,sans-serif;}
    input,select{background:#0a0010;border:1px solid #3b0764;border-radius:6px;color:white;padding:6px 8px;font-size:12px;width:100%;outline:none;}
    input:focus{border-color:#c084fc;}
    .log-btn{background:#7c3aed;border:none;border-radius:8px;color:white;font-size:12px;font-weight:700;padding:8px 14px;cursor:pointer;}
    .log-btn:hover{opacity:0.85;}
    .hist-row{display:flex;justify-content:space-between;font-size:11px;color:#d8b4fe;padding:4px 0;border-bottom:1px solid #3b076422;}
    .hist-row:last-child{border-bottom:none;}
    .hist-date{color:#c084fc;font-weight:700;font-size:11px;margin-bottom:4px;}
    .hist-block{background:#0a0010;border-radius:8px;padding:8px 10px;margin-bottom:8px;}
    .del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:13px;padding:0 2px;}
    .back-btn{display:inline-flex;align-items:center;gap:6px;background:#1a0030;border:1px solid #3b0764;border-radius:8px;color:#c084fc;font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer;text-decoration:none;margin-bottom:12px;}
    .back-btn:active{opacity:0.8;}
    .cal-picker{background:#1a0030;border:1px solid #3b0764;border-radius:12px;padding:12px;margin-bottom:12px;}
    .cal-picker-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .cal-picker-title{color:#c084fc;font-size:13px;font-weight:800;}
    .cal-nav{background:#3b076433;border:1px solid #3b0764;color:#c084fc;border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer;}
    .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
    .cal-dow span{text-align:center;font-size:9px;color:#6b7280;font-weight:700;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
    .cal-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6b7280;background:#0a0010;cursor:pointer;}
    .cal-cell:hover{background:#3b076433;color:#c084fc;}
    .cal-cell.today{border:1.5px solid #7c3aed;color:white;}
    .cal-cell.selected{background:#7c3aed;color:white;}
    .cal-cell.future{opacity:0.25;pointer-events:none;}
    .cal-cell.empty{background:transparent;pointer-events:none;}
    .active-date-bar{background:#3b0764;border-radius:8px;padding:7px 12px;margin-bottom:12px;font-size:12px;color:#c084fc;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
    .today-btn{background:none;border:1px solid #7c3aed;border-radius:6px;color:#a78bfa;font-size:11px;padding:3px 8px;cursor:pointer;}
    .set-row{display:grid;grid-template-columns:28px 1fr 1fr 24px;gap:5px;align-items:center;margin-bottom:6px;}
    .set-label{font-size:11px;font-weight:800;color:#7c3aed;text-align:center;}
    .add-set-btn{background:#0a0010;border:1px dashed #7c3aed;border-radius:8px;color:#a78bfa;font-size:12px;font-weight:700;padding:7px;cursor:pointer;width:100%;margin-top:4px;}
    .remove-set-btn{background:none;border:none;color:#6b7280;cursor:pointer;font-size:15px;line-height:1;padding:0;}
    .remove-set-btn:hover{color:#ef4444;}
    .hist-day-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#2a0050;cursor:pointer;user-select:none;}
    .hist-day-title{font-size:13px;font-weight:800;color:#c084fc;}
    .hist-day-toggle{font-size:11px;color:#a78bfa;font-weight:700;}
    .yt-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:#ff0000;border:none;border-radius:8px;color:white;font-size:12px;font-weight:700;padding:8px 12px;cursor:pointer;margin-bottom:10px;text-decoration:none;}
    .yt-btn:hover{background:#cc0000;}
    .prog-bar-wrap{background:rgba(255,255,255,0.15);border-radius:20px;height:6px;overflow:hidden;margin-top:6px;}
    .prog-bar{height:100%;border-radius:20px;background:rgba(255,255,255,0.9);transition:width 0.4s;}
  </style>
</head>
<body>
<div id="root"></div>

<!-- Exercise data — plain JS -->
<script>
var STORAGE_PREFIX_WST = 'wst_';
var SESSIONS_TO_ADVANCE_WST = 2;

var LIB = {
  deadBug:{name:"Dead Bug",area:"Transverse Abs — Waist Cinch",emoji:"🐛",sets:3,setsLabel:"3 × 10 each side",equipment:"none",gym:"Lower back GLUED to floor the entire time.",home:"Same at home.",tip:"Exhale hard as you extend — that forced exhale contracts the transverse abdominis.",howto:["Lie on back, arms straight up, knees bent 90° in air","Press lower back FIRMLY into floor","Slowly lower opposite arm and leg toward floor","Lower back must not lift — ever","Return slowly, repeat other side"]},
  sideCrunch:{name:"Standing Side Crunch",area:"Obliques — Side Definition",emoji:"↔️",sets:3,setsLabel:"3 × 20 each side",equipment:"none",gym:"Stand feet hip-width, hands behind head. Lift knee and crunch elbow toward it.",home:"Same at home.",tip:"Pause 1 second at the top — that hold doubles the oblique activation.",howto:["Stand feet hip-width, hands behind head","Lift RIGHT knee toward right elbow","Crunch side of torso — feel oblique squeeze","Pause 1 second at the top","Switch sides"]},
  hipDipPlank:{name:"Hip Dip Plank",area:"Glute Medius & Obliques",emoji:"🌀",sets:3,setsLabel:"3 × 15 each side",equipment:"none",gym:"Side plank on elbow, dip hip to floor and drive back up.",home:"Same at home on a mat.",tip:"Drive the hip UP as high as possible — the top is where hip dip filling happens.",howto:["Side plank — elbow under shoulder, body in straight line","Lower hip toward floor slowly","Drive hip UP as high as possible — squeeze","Hold at top 1 second","15 dips then flip to other side"]},
  hollowBody:{name:"Hollow Body Hold",area:"Transverse Abs — Deep Cinch",emoji:"🌙",sets:3,setsLabel:"3 × 30 sec hold",equipment:"none",gym:"Arms overhead, legs extended, lower back flat.",home:"Same at home on mat.",tip:"Pull belly button through the floor — that internal cue makes this a waist exercise.",howto:["Lie on back, press lower back into floor","Extend arms overhead, legs out straight","Lift arms, head, shoulders and legs slightly","Lower back stays GLUED to floor","Hold and breathe"]},
  woodchop:{name:"Woodchop — High to Low",area:"Obliques — Rotational Power",emoji:"🪓",sets:3,setsLabel:"3 × 12 each side",equipment:"gym:cable | home:band",gym:"Cable set high. Pull handle diagonally down across your body.",home:"Anchor band high on door frame. Same diagonal chopping motion.",tip:"The rotation comes from your WAIST not your arms.",howto:["Stand feet shoulder-width, hold cable/band at high diagonal","Rotate torso and pull down across body to opposite hip","Keep arms mostly straight — rotation from the waist","Control the return","All reps one side then switch"]},
  sideLyingRaise:{name:"Side Lying Hip Raise",area:"Glute Medius — Hip Dip Filler",emoji:"🦵",sets:3,setsLabel:"3 × 15 each side",equipment:"none",gym:"Lie on side on mat, lift hips off floor.",home:"Add band above knees for extra burn.",tip:"Push for height at the top — higher lift = more glute medius.",howto:["Lie on side, legs stacked, elbow under shoulder","Lift hips off floor — squeeze outer glute","Hold at top 1–2 seconds","Lower slowly","Switch sides"]},
  bicycleCrunch:{name:"Bicycle Crunch",area:"Obliques — Upper & Lower",emoji:"🚲",sets:3,setsLabel:"3 × 20 each side",equipment:"none",gym:"Slow controlled bicycles. 3 seconds per rep.",home:"Same on floor.",tip:"Twist from your WAIST not your neck.",howto:["Lie on back, hands lightly behind head","Lift both knees to tabletop","Extend one leg, rotate opposite elbow toward bent knee","Twist from the waist — not the neck","3 seconds per rep"]},
  russianTwist:{name:"Seated Russian Twist",area:"Obliques — Rotational Definition",emoji:"🌀",sets:3,setsLabel:"3 × 20 each side",equipment:"gym:weight plate | home:optional",gym:"Hold weight plate. Lean back slightly, rotate fully side to side.",home:"Hold a water bottle or go bodyweight.",tip:"Touch the floor on each side — full range of motion.",howto:["Sit on floor, knees bent, feet flat or lifted","Lean back slightly — abs engage","Rotate torso fully RIGHT — touch floor","Rotate fully LEFT — touch floor","Stay leaned back throughout"]},
  cableObliqueCrunch:{name:"Oblique Band Crunch",area:"Obliques — Weighted Definition",emoji:"💪",sets:3,setsLabel:"3 × 15 each side",equipment:"gym:cable | home:band",gym:"Cable set above head height. Stand side-on and crunch toward your hip.",home:"Band anchored at top of door frame.",tip:"Keep the movement small and isolated — this is a CRUNCH not a full side bend.",howto:["Anchor cable/band at head height","Stand side-on, hold handle with one hand","Crunch side of waist — pull down toward hip","Keep elbow close to body","Squeeze oblique hard at bottom","Release slowly"]},
  plankHipTap:{name:"Plank Hip Tap",area:"Transverse Abs & Obliques",emoji:"⬇️",sets:3,setsLabel:"3 × 20 each side",equipment:"none",gym:"Full plank, rotate hips to tap side to side.",home:"Same on floor.",tip:"Keep hips LOW — smaller rotation = harder transverse abs work.",howto:["Start in full plank — hands under shoulders","Keep core tight and hips low","Rotate hips to tap RIGHT hip toward floor","Return to center","Rotate hips to tap LEFT hip","Keep movement controlled"]},
  standingObliqueDumbbell:{name:"Dumbbell Side Bend",area:"Obliques — Lateral Definition",emoji:"🏋️",sets:3,setsLabel:"3 × 15 each side",equipment:"gym:dumbbell | home:dumbbell",gym:"Hold one dumbbell at side. Slowly bend toward it then pull back up.",home:"Same with a dumbbell or household weight.",tip:"The return is the work — pull back up with your oblique, not momentum.",howto:["Stand feet hip-width, one dumbbell in right hand","Let it pull you slowly to the right — side bend","Feel the LEFT oblique stretch","Contract left oblique to pull back up","15 reps then switch"]},
  reverseCrunch:{name:"Reverse Crunch",area:"Lower Abs — Waist Base",emoji:"🔄",sets:3,setsLabel:"3 × 15 reps",equipment:"none",gym:"Lie on back, legs raised. Use lower abs to curl hips off floor.",home:"Same on mat.",tip:"If you feel it in hip flexors more than abs, slow down even more.",howto:["Lie on back, legs raised, knees slightly bent","Press lower back into floor","Using LOWER ABS, curl hips up off floor","Hold at top 1 second","Lower slowly — do not drop"]},
  mountainClimber:{name:"Mountain Climber — Slow",area:"Transverse Abs & Obliques",emoji:"🏔️",sets:3,setsLabel:"3 × 20 each leg",equipment:"none",gym:"Full plank. Drive knees toward chest slowly — 3 seconds per rep.",home:"Same on mat.",tip:"The slower you go, the more the deep abs work.",howto:["Full plank — hands under shoulders","Drive RIGHT knee slowly toward chest","Hold 1 second at the top","Return slowly","Drive LEFT knee — 3 seconds per rep","Keep hips level"]},
  spiderPlank:{name:"Spider Plank",area:"Obliques & Hip Flexors",emoji:"🕷️",sets:3,setsLabel:"3 × 12 each side",equipment:"none",gym:"Full plank — bring one knee out to the side toward your elbow.",home:"Same on mat.",tip:"Bring knee to elbow — the more your knee meets elbow the more oblique you feel.",howto:["Full plank — hands under shoulders","Drive RIGHT knee out to the side toward RIGHT elbow","Keep hips level","Hold 1 second when knee meets elbow","Return, switch sides"]},
  vSitHold:{name:"V-Sit Hold",area:"Core Stamina — All Abs",emoji:"✌️",sets:3,setsLabel:"3 × 20–30 sec hold",equipment:"none",gym:"Sit on mat, lean back, raise legs to 45°, arms extended forward.",home:"Same on mat.",tip:"The further you lean back, the harder the abs work.",howto:["Sit on mat, knees bent","Lean torso back to 45° — abs engage","Lift feet off floor, legs extended or bent","Arms reach forward","Hold and breathe"]},
  crossBodyMountain:{name:"Cross Body Mountain Climber",area:"Obliques — Rotational",emoji:"❌",sets:3,setsLabel:"3 × 16 each side",equipment:"none",gym:"Full plank. Drive knee across body toward opposite elbow.",home:"Same on mat.",tip:"Twist your hip to really bring the knee across.",howto:["Full plank — hands under shoulders","Drive RIGHT knee toward LEFT elbow","Twist hip to bring it across","Hold 1 second","Return, switch sides"]},
  standingTwistBand:{name:"Standing Twist with Band",area:"Obliques — Anti-Rotation",emoji:"🔁",sets:3,setsLabel:"3 × 15 each side",equipment:"gym:cable | home:band",gym:"Cable at chest height, stand sideways. Pull and rotate torso across body.",home:"Band anchored in doorframe at chest height.",tip:"Plant your feet — all rotation comes from the waist up.",howto:["Anchor cable/band at chest height","Stand sideways, arms extended","Rotate torso away from anchor","Control the return","15 reps then switch sides"]},
  legRaisesLying:{name:"Lying Leg Raises",area:"Lower Abs — Waist Base",emoji:"⬆️",sets:3,setsLabel:"3 × 15 reps",equipment:"none",gym:"Lie flat, legs straight, press lower back into floor. Raise legs to 90°.",home:"Same on mat.",tip:"Lower back lifting = lower abs have given out. Reduce range.",howto:["Lie flat, legs straight, arms at sides","Press lower back firmly into floor","Raise both legs straight up to 90°","Slowly lower — stop before lower back lifts","Raise again without letting feet touch"]},
  sitUpTwist:{name:"Sit Up with Twist",area:"Full Abs — Definition",emoji:"💫",sets:3,setsLabel:"3 × 15 each side",equipment:"gym:weight plate | home:optional",gym:"Full sit up, add a twist at the top. Hold a weight plate for more resistance.",home:"Bodyweight or hold a heavy book.",tip:"The twist at the top is the oblique hit — do not rush through it.",howto:["Lie on back, knees bent, hands at chest","Perform a full sit up","At the top, rotate torso to the RIGHT","Return to center, lower back down","Alternate twist direction each rep"]},
  plankReachThrough:{name:"Plank Reach Through",area:"Obliques & Core Stability",emoji:"🤚",sets:3,setsLabel:"3 × 12 each side",equipment:"none",gym:"Side plank — reach under your body with your top arm then open back wide.",home:"Same on mat.",tip:"The wider you open at the top, the more oblique and shoulder work together.",howto:["Get into side plank","Raise top arm straight up","Rotate: reach top arm under your body","Return to open position","12 reps then flip"]}
};

var WEEKLY=[
  ['deadBug','sideCrunch','hipDipPlank','hollowBody','bicycleCrunch','reverseCrunch'],
  ['deadBug','russianTwist','sideLyingRaise','woodchop','plankHipTap','sitUpTwist'],
  ['hollowBody','mountainClimber','sideCrunch','cableObliqueCrunch','hipDipPlank','legRaisesLying'],
  ['deadBug','bicycleCrunch','standingObliqueDumbbell','plankHipTap','reverseCrunch','russianTwist'],
  ['woodchop','spiderPlank','vSitHold','sideLyingRaise','crossBodyMountain','hollowBody'],
  ['mountainClimber','cableObliqueCrunch','standingTwistBand','deadBug','hipDipPlank','sitUpTwist'],
  ['vSitHold','bicycleCrunch','plankReachThrough','woodchop','reverseCrunch','standingObliqueDumbbell'],
  ['crossBodyMountain','sideCrunch','legRaisesLying','spiderPlank','russianTwist','hollowBody'],
  ['spiderPlank','woodchop','vSitHold','crossBodyMountain','standingTwistBand','plankReachThrough'],
  ['mountainClimber','sitUpTwist','cableObliqueCrunch','deadBug','hipDipPlank','vSitHold'],
  ['plankReachThrough','standingObliqueDumbbell','crossBodyMountain','bicycleCrunch','woodchop','legRaisesLying'],
  ['spiderPlank','russianTwist','standingTwistBand','hollowBody','sitUpTwist','reverseCrunch']
];

function getWeekExercises(w){return WEEKLY[w-1].map(function(k){return LIB[k];});}
function getPhaseLabel(w){return w<=4?'Foundation':w<=8?'Build':'Peak';}
function getPhaseColor(w){return w<=4?'#7c3aed':w<=8?'#059669':'#db2777';}

function safeGetWST(k){try{return localStorage.getItem(k);}catch(e){try{return sessionStorage.getItem(k);}catch(e2){return null;}}}
function safeSetWST(k,v){try{localStorage.setItem(k,v);}catch(e){try{sessionStorage.setItem(k,v);}catch(e2){}}}

function recordSessionWST(dateStr,weekNum){
  var key=STORAGE_PREFIX_WST+'sessions_w'+weekNum;
  var sessions=JSON.parse(safeGetWST(key)||'[]');
  if(sessions.indexOf(dateStr)===-1){sessions.push(dateStr);safeSetWST(key,JSON.stringify(sessions));}
}
function calcWeekWST(){
  var week=1;
  for(var w=1;w<=12;w++){
    var sessions=JSON.parse(safeGetWST(STORAGE_PREFIX_WST+'sessions_w'+w)||'[]');
    if(sessions.length>=SESSIONS_TO_ADVANCE_WST){week=w<12?w+1:12;}
    else{week=w;break;}
  }
  return week;
}
function getSessionCountWST(weekNum){
  return JSON.parse(safeGetWST(STORAGE_PREFIX_WST+'sessions_w'+weekNum)||'[]').length;
}
</script>

<!-- React app -->
<script>
var useState=React.useState,useEffect=React.useEffect;

function todayStr(){var n=new Date(),y=n.getFullYear(),mo=n.getMonth()+1,d=n.getDate();return y+'-'+(mo<10?'0'+mo:mo)+'-'+(d<10?'0'+d:d);}
function friendlyDate(iso){return new Date(iso+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function safeGet(k){try{return localStorage.getItem(k);}catch(e){try{return sessionStorage.getItem(k);}catch(e2){return null;}}}
function safeSet(k,v){try{localStorage.setItem(k,v);}catch(e){try{sessionStorage.setItem(k,v);}catch(e2){}}}
function safeRemove(k){try{localStorage.removeItem(k);}catch(e){try{sessionStorage.removeItem(k);}catch(e2){}}}
function safeKeys(prefix){var keys=[];try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith(prefix))keys.push(k);}}catch(e){try{for(var i=0;i<sessionStorage.length;i++){var k=sessionStorage.key(i);if(k&&k.startsWith(prefix))keys.push(k);}}catch(e2){}}return keys;}
function parseSets(s){if(!s)return 3;var m=s.match(/^(\d+)/);return m?Math.min(parseInt(m[1]),6):3;}
function ytUrl(name){return 'https://www.youtube.com/results?search_query='+encodeURIComponent(name+' exercise how to');}

function equipmentBadge(eq,isHome){
  if(eq==="none")return React.createElement("span",{style:{fontSize:10,color:"#6b7280",fontWeight:600}},"🟢 No equipment");
  var parts=eq.split("|"),relevant=isHome?parts[1]:parts[0];
  if(!relevant)return null;
  var label=relevant.replace("gym:","").replace("home:","").trim();
  if(label==="optional")return React.createElement("span",{style:{fontSize:10,color:"#6b7280",fontWeight:600}},"🟡 Optional weight");
  return React.createElement("span",{style:{fontSize:10,color:"#f9a8d4",fontWeight:600}},"🔧 Needs: "+label);
}

function CalendarPicker(props){
  var activeDate=props.activeDate,onSelect=props.onSelect,todayISO=todayStr();
  var initY=parseInt(activeDate.slice(0,4)),initM=parseInt(activeDate.slice(5,7))-1;
  var cy=useState(initY),calYear=cy[0],setCalYear=cy[1];
  var cm=useState(initM),calMonth=cm[0],setCalMonth=cm[1];
  function prevMonth(){if(calMonth===0){setCalMonth(11);setCalYear(calYear-1);}else setCalMonth(calMonth-1);}
  function nextMonth(){var nm=calMonth+1,ny=calYear;if(nm>11){nm=0;ny++;}if(ny+'-'+String(nm+1).padStart(2,'0')+'-01'>todayISO)return;setCalMonth(nm);setCalYear(ny);}
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var fd=new Date(calYear,calMonth,1).getDay(),dim=new Date(calYear,calMonth+1,0).getDate(),cells=[];
  for(var i=0;i<fd;i++)cells.push(null);
  for(var d=1;d<=dim;d++)cells.push(d);
  return React.createElement('div',{className:'cal-picker'},
    React.createElement('div',{className:'cal-picker-header'},
      React.createElement('button',{className:'cal-nav',onClick:prevMonth},'◀'),
      React.createElement('span',{className:'cal-picker-title'},months[calMonth]+' '+calYear),
      React.createElement('button',{className:'cal-nav',onClick:nextMonth},'▶')
    ),
    React.createElement('div',{className:'cal-dow'},['Su','Mo','Tu','We','Th','Fr','Sa'].map(function(d){return React.createElement('span',{key:d},d);})),
    React.createElement('div',{className:'cal-grid'},cells.map(function(d,i){
      if(!d)return React.createElement('div',{key:'e'+i,className:'cal-cell empty'});
      var iso=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var cls='cal-cell'+(iso===todayISO?' today':'')+(iso===activeDate?' selected':'')+(iso>todayISO?' future':'');
      return React.createElement('div',{key:iso,className:cls,onClick:function(){if(iso<=todayISO)onSelect(iso);}},d);
    }))
  );
}

function LogForm(props){
  var numSets=props.sets||3;
  function mk(){return{reps:'',weight:''};}
  var initRows=[];for(var i=0;i<numSets;i++)initRows.push(mk());
  var rw=useState(initRows),rows=rw[0],setRows=rw[1];
  var sv=useState(false),saving=sv[0],setSaving=sv[1];
  function upd(idx,f,v){setRows(function(p){var n=p.map(function(r){return Object.assign({},r);});n[idx][f]=v;return n;});}
  function submit(){
    var filled=rows.filter(function(r){return r.reps||r.weight;});
    if(!filled.length)return;
    setSaving(true);
    var logDate=props.logDate||todayStr();
    var key=STORAGE_PREFIX_WST+logDate+'_'+props.exName.replace(/\s+/g,'-');
    var existing=JSON.parse(safeGet(key)||'[]');
    var ts=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    filled.forEach(function(r,i){existing.push({set:i+1,reps:r.reps,weight:r.weight,time:ts});});
    safeSet(key,JSON.stringify(existing));
    recordSessionWST(logDate, props.currentWeek);
    var reset=[];for(var i=0;i<numSets;i++)reset.push(mk());
    setRows(reset);setSaving(false);props.onSaved();
  }
  return React.createElement('div',{style:{background:'#0a0010',border:'1px solid #3b0764',borderRadius:10,padding:12,marginTop:8}},
    React.createElement('div',{style:{fontSize:11,color:'#c084fc',fontWeight:700,marginBottom:10}},'📝 Log This Exercise'),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'28px 1fr 1fr 24px',gap:5,marginBottom:4}},
      React.createElement('div',null),
      React.createElement('div',{style:{fontSize:10,color:'#9ca3af',fontWeight:700}},'REPS'),
      React.createElement('div',{style:{fontSize:10,color:'#9ca3af',fontWeight:700}},'WEIGHT / NOTE'),
      React.createElement('div',null)
    ),
    rows.map(function(row,i){var ci=i;return React.createElement('div',{key:i,className:'set-row'},
      React.createElement('div',{className:'set-label'},'S'+(i+1)),
      React.createElement('input',{type:'text',placeholder:'20',value:row.reps,onChange:function(e){upd(ci,'reps',e.target.value);}}),
      React.createElement('input',{type:'text',placeholder:'BW / 15 lb',value:row.weight,onChange:function(e){upd(ci,'weight',e.target.value);}}),
      React.createElement('button',{className:'remove-set-btn',onClick:function(){setRows(function(p){return p.length>1?p.filter(function(_,j){return j!==ci;}):p;});}},'×')
    );}),
    React.createElement('button',{className:'add-set-btn',onClick:function(){setRows(function(p){return p.concat(mk());});}},'+ Add Set'),
    React.createElement('button',{className:'log-btn',onClick:submit,style:{width:'100%',marginTop:10,opacity:saving?0.6:1}},saving?'Saving...':'💾 Save All Sets')
  );
}

function HistoryView(){
  var d=useState(null),setData=d[1];d=d[0];
  var rf=useState(0),setRf=rf[1];rf=rf[0];
  var op=useState({}),openDates=op[0],setOpenDates=op[1];
  useEffect(function(){
    var keys=safeKeys(STORAGE_PREFIX_WST).filter(function(k){return k.indexOf('sessions_')===-1;});
    var byDate={};
    keys.forEach(function(k){
      var parts=k.replace(STORAGE_PREFIX_WST,'').split('_');
      var date=parts[0],ex=parts.slice(1).join(' ').replace(/-/g,' ');
      var entries=JSON.parse(safeGet(k)||'[]');
      if(!byDate[date])byDate[date]={};
      byDate[date][ex]=entries;
    });
    setData(byDate);
  },[rf]);
  function toggleDate(date){setOpenDates(function(p){var n=Object.assign({},p);n[date]=!p[date];return n;});}
  function delEntry(key,idx){
    var entries=JSON.parse(safeGet(key)||'[]');entries.splice(idx,1);
    if(entries.length)safeSet(key,JSON.stringify(entries));else safeRemove(key);
    setRf(function(x){return x+1;});
  }
  if(!d)return React.createElement('div',{style:{textAlign:'center',color:'#9ca3af',fontSize:13,padding:'20px 0'}},'Loading...');
  if(!Object.keys(d).length)return React.createElement('div',{style:{textAlign:'center',color:'#6b7280',fontSize:13,padding:'30px 0'}},'No logs yet. Tap 📝 Log on any exercise to start tracking!');
  return React.createElement('div',null,
    Object.keys(d).sort(function(a,b){return b.localeCompare(a);}).map(function(date){
      var exs=d[date],isOpen=!!openDates[date],total=Object.values(exs).reduce(function(s,e){return s+e.length;},0);
      return React.createElement('div',{key:date,style:{background:'#1a0030',border:'1px solid #3b0764',borderRadius:12,marginBottom:10,overflow:'hidden'}},
        React.createElement('div',{className:'hist-day-header',onClick:function(){toggleDate(date);}},
          React.createElement('div',null,
            React.createElement('div',{className:'hist-day-title'},'📅 '+friendlyDate(date)),
            React.createElement('div',{style:{fontSize:10,color:'#6b7280',marginTop:2}},Object.keys(exs).length+' exercises · '+total+' sets')
          ),
          React.createElement('div',{className:'hist-day-toggle'},isOpen?'▲ Hide':'▼ Show')
        ),
        isOpen&&React.createElement('div',{style:{padding:'10px 14px'}},
          Object.keys(exs).map(function(ex){
            var entries=exs[ex],logKey=STORAGE_PREFIX_WST+date+'_'+ex.replace(/\s+/g,'-');
            return React.createElement('div',{key:ex,className:'hist-block'},
              React.createElement('div',{className:'hist-date'},ex),
              entries.map(function(entry,idx){var ci=idx,ck=logKey;
                return React.createElement('div',{key:idx,className:'hist-row'},
                  React.createElement('span',{style:{color:'#a78bfa',fontWeight:700,marginRight:6}},entry.set?'Set '+entry.set:''),
                  React.createElement('span',null,(entry.reps?entry.reps+' reps':'')+(entry.weight?' @ '+entry.weight:'')),
                  React.createElement('span',{style:{display:'flex',alignItems:'center',gap:6}},
                    React.createElement('span',{style:{color:'#6b7280'}},entry.time||''),
                    React.createElement('button',{className:'del',onClick:function(){delEntry(ck,ci);}},'×')
                  )
                );
              })
            );
          })
        )
      );
    })
  );
}
